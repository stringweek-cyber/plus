<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더하기만 하는 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            background-color: #e5e7eb;
        }
        .btn-active:active {
            transform: scale(0.95);
            background-color: #d1d5db;
        }
        .equal-btn-active:active {
            transform: scale(0.95);
            background-color: #1d4ed8;
        }
        /* 헤더 아이콘 애니메이션 */
        .header-icon {
            filter: drop-shadow(0 2px 4px rgba(59, 130, 246, 0.3));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        <!-- 디자인이 개선된 Header -->
        <header class="bg-gradient-to-r from-gray-50 to-white p-6 border-b border-gray-100 flex items-center justify-center gap-3">
            <!-- 아이콘 크기 및 패딩 수정 -->
            <div class="bg-blue-500 p-1.5 rounded-lg header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </div>
            <h1 class="text-lg font-extrabold tracking-tight text-gray-800">
                더하기 <span class="text-blue-600">계산기</span>
            </h1>
        </header>

        <!-- Display Area -->
        <div class="p-6 bg-white min-h-[140px] flex flex-col justify-end items-end">
            <div id="formula-display" class="text-gray-400 text-lg break-all text-right mb-2 leading-tight">
                준비됨
            </div>
            <div id="result-display" class="text-4xl font-bold text-gray-800 break-all text-right">
                0
            </div>
        </div>

        <!-- Keypad Area -->
        <div class="p-6 bg-gray-100 grid grid-cols-3 gap-4 border-t border-gray-200">
            <!-- 1 2 3 -->
            <button onclick="addNumber(1)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">1</button>
            <button onclick="addNumber(2)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">2</button>
            <button onclick="addNumber(3)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">3</button>
            
            <!-- 4 5 6 -->
            <button onclick="addNumber(4)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">4</button>
            <button onclick="addNumber(5)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">5</button>
            <button onclick="addNumber(6)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">6</button>
            
            <!-- 7 8 9 -->
            <button onclick="addNumber(7)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">7</button>
            <button onclick="addNumber(8)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">8</button>
            <button onclick="addNumber(9)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">9</button>
            
            <!-- Clear & Equal -->
            <button onclick="resetCalculator()" class="btn-active bg-red-100 py-6 rounded-2xl text-xl font-bold text-red-600 shadow-md transition-all">C</button>
            <button onclick="addNumber(0)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-bold text-gray-800 shadow-md transition-all">0</button>
            <button onclick="calculate()" class="equal-btn-active bg-blue-600 py-6 rounded-2xl text-2xl font-bold text-white shadow-lg transition-all col-span-1">=</button>
        </div>
    </div>

    <script>
        let currentFormula = [];
        let totalSum = 0;
        let isEvaluated = false;

        const formulaDisplay = document.getElementById('formula-display');
        const resultDisplay = document.getElementById('result-display');

        function updateDisplay() {
            if (currentFormula.length === 0) {
                formulaDisplay.innerText = "준비됨";
                resultDisplay.innerText = "0";
            } else {
                formulaDisplay.innerText = currentFormula.join(' + ');
                totalSum = currentFormula.reduce((acc, curr) => acc + curr, 0);
                if (!isEvaluated) {
                    resultDisplay.innerText = totalSum;
                }
            }
        }

        function addNumber(num) {
            if (isEvaluated) {
                currentFormula = [];
                isEvaluated = false;
            }
            currentFormula.push(num);
            updateDisplay();
        }

        function calculate() {
            if (currentFormula.length === 0) return;
            
            totalSum = currentFormula.reduce((acc, curr) => acc + curr, 0);
            formulaDisplay.innerText = currentFormula.join(' + ') + ' =';
            resultDisplay.innerText = totalSum;
            isEvaluated = true;
        }

        function resetCalculator() {
            currentFormula = [];
            totalSum = 0;
            isEvaluated = false;
            updateDisplay();
        }
    </script>
</body>
</html>
