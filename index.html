<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더하기만 하는 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            background-color: #f3f4f6;
        }
        .btn-active:active {
            transform: scale(0.95);
            background-color: #e5e7eb;
        }
        .equal-btn-active:active {
            transform: scale(0.95);
            background-color: #2563eb;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <header class="bg-gray-50 p-6 border-b border-gray-100">
            <h1 class="text-xl font-bold text-center text-gray-700">더하기만 하는 계산기</h1>
        </header>

        <!-- Display Area -->
        <div class="p-6 bg-white min-h-[140px] flex flex-col justify-end items-end">
            <div id="formula-display" class="text-gray-400 text-lg break-all text-right mb-2 leading-tight">
                준비됨
            </div>
            <div id="result-display" class="text-4xl font-bold text-gray-800 break-all text-right">
                0
            </div>
        </div>

        <!-- Keypad Area -->
        <div class="p-6 bg-gray-50 grid grid-cols-3 gap-4">
            <!-- 1 2 3 -->
            <button onclick="addNumber(1)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">1</button>
            <button onclick="addNumber(2)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">2</button>
            <button onclick="addNumber(3)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">3</button>
            
            <!-- 4 5 6 -->
            <button onclick="addNumber(4)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">4</button>
            <button onclick="addNumber(5)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">5</button>
            <button onclick="addNumber(6)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">6</button>
            
            <!-- 7 8 9 -->
            <button onclick="addNumber(7)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">7</button>
            <button onclick="addNumber(8)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">8</button>
            <button onclick="addNumber(9)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">9</button>
            
            <!-- Clear & Equal -->
            <button onclick="resetCalculator()" class="btn-active bg-red-50 py-6 rounded-2xl text-xl font-bold text-red-500 shadow-sm transition-all">C</button>
            <button onclick="addNumber(0)" class="btn-active bg-white py-6 rounded-2xl text-2xl font-semibold text-gray-700 shadow-sm transition-all">0</button>
            <button onclick="calculate()" class="equal-btn-active bg-blue-500 py-6 rounded-2xl text-2xl font-bold text-white shadow-md transition-all col-span-1">=</button>
        </div>
    </div>

    <script>
        let currentFormula = [];
        let totalSum = 0;
        let isEvaluated = false;

        const formulaDisplay = document.getElementById('formula-display');
        const resultDisplay = document.getElementById('result-display');

        function updateDisplay() {
            if (currentFormula.length === 0) {
                formulaDisplay.innerText = "준비됨";
                resultDisplay.innerText = "0";
            } else {
                formulaDisplay.innerText = currentFormula.join(' + ');
                // 합산 로직
                totalSum = currentFormula.reduce((acc, curr) => acc + curr, 0);
                if (!isEvaluated) {
                    resultDisplay.innerText = totalSum;
                }
            }
        }

        function addNumber(num) {
            if (isEvaluated) {
                currentFormula = [];
                isEvaluated = false;
            }
            currentFormula.push(num);
            updateDisplay();
        }

        function calculate() {
            if (currentFormula.length === 0) return;
            
            totalSum = currentFormula.reduce((acc, curr) => acc + curr, 0);
            formulaDisplay.innerText = currentFormula.join(' + ') + ' =';
            resultDisplay.innerText = totalSum;
            isEvaluated = true;
        }

        function resetCalculator() {
            currentFormula = [];
            totalSum = 0;
            isEvaluated = false;
            updateDisplay();
        }
    </script>
</body>
</html>
